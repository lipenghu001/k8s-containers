name: Build and Push to ACR

on:
  push:
    branches: [ "main" ] # 你可以根据需要修改触发分支

env:
  REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
  IMAGE_NAME: nginx # 请将这里改成你的镜像名称

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 这是关键步骤：设置 QEMU 模拟器，实现在 x86 机器上构建 amd64 镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到你的阿里云 ACR
      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # 构建并推送 amd64 镜像
      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: nginx
          dockerfile: nginx/Dockerfile
          # 指定构建平台为 linux/amd64
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:1.21-alpine
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}